server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json;

    location = /foronly-docs {
        return 301 $scheme://$http_host/foronly-docs/;
    }

    location /foronly-docs/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ $uri.html /foronly-docs/index.html;
    }
}
